status = error
name = PropertiesConfig

# Definicion de Appenders
appenders = console, rolling

# 1. CONSOLA (Solo INFO para arriba, limpio)
appender.console.type = Console
appender.console.name = STDOUT
appender.console.layout.type = PatternLayout
appender.console.layout.pattern = [%d{HH:mm:ss}] %-5p %c{1} - %m%n

# 2. ARCHIVO (DEBUG para ver detalles, con rotacion)
appender.rolling.type = RollingFile
appender.rolling.name = RollingFile

appender.rolling.fileName = ${sys:noema.log.path:-.noema-agent}/noema-agente.log
appender.rolling.filePattern = ${sys:noema.log.path:-.noema-agent}/noema-agente-%d{MM-dd-yy}-%i.log.gz

appender.rolling.layout.type = PatternLayout
appender.rolling.layout.pattern = %d{yyyy-MM-dd HH:mm:ss} %-5p %c{1} - %m%n
appender.rolling.policies.type = Policies
appender.rolling.policies.time.type = TimeBasedTriggeringPolicy
appender.rolling.policies.time.interval = 1
appender.rolling.strategy.type = DefaultRolloverStrategy
appender.rolling.strategy.max = 5

# Configuracion del Root Logger
rootLogger.level = info
rootLogger.appenderRefs = console, rolling
rootLogger.appenderRef.console.ref = STDOUT
rootLogger.appenderRef.rolling.ref = RollingFile

# Reducir ruido de librer\u00edas externas en consola
logger.djl.name = ai.djl
logger.djl.level = warn

logger.h2.name = org.h2
logger.h2.level = warn